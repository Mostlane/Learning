name = "timesheet-kv-worker"
main = "worker.js"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "PROFILES"
id = "REPLACE_WITH_PROFILES_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "TIMESHEETS"
id = "REPLACE_WITH_TIMESHEETS_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "EMPLOYEE_TIMESHEETS"
id = "REPLACE_WITH_EMPLOYEE_TIMESHEETS_KV_NAMESPACE_ID"

[vars]
API_KEY = "REPLACE_WITH_STRONG_API_KEY"
