<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timesheet</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 950px; margin: 2rem auto; padding: 0 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #ddd; padding: 8px; }
    input, textarea, button { width: 100%; padding: 6px; box-sizing: border-box; }
    textarea { min-height: 50px; }
    .actions { margin: 1rem 0; display: flex; gap: 10px; }
    a.btn, button { padding: 8px 12px; border: 1px solid #aaa; background: #f5f5f5; border-radius: 6px; text-decoration: none; color: #000; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Weekly Timesheet</h1>
  <div id="meta">Loading...</div>

  <div class="actions">
    <a class="btn" href="/dashboard.html">Back to Dashboard</a>
    <button id="saveBtn">Save</button>
  </div>

  <table>
    <thead><tr><th>Day</th><th>Hours</th><th>Description</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <div id="msg"></div>

  <script>
    const rowsEl = document.getElementById('rows');
    const msgEl = document.getElementById('msg');
    const metaEl = document.getElementById('meta');

    const params = new URLSearchParams(location.search);
    let year = Number(params.get('year'));
    let weekNumber = Number(params.get('weekNumber'));
    let exists = false;

    async function detectCurrentWeekIfNeeded() {
      if (Number.isInteger(year) && Number.isInteger(weekNumber)) return;
      const res = await fetch('/api/dashboard');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Unable to resolve current week');
      year = data.currentWeek.year;
      weekNumber = data.currentWeek.weekNumber;
      history.replaceState({}, '', `/timesheet.html?year=${year}&weekNumber=${weekNumber}`);
    }

    async function init() {
      try {
        await detectCurrentWeekIfNeeded();
        const res = await fetch(`/api/timesheet?year=${year}&weekNumber=${weekNumber}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load timesheet');

        exists = data.exists;
        metaEl.textContent = `Week ${data.weekNumber}, ${data.year} (starts ${data.weekStartDate})`;
        rowsEl.innerHTML = '';

        for (const entry of data.entries) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${entry.day}</td>
            <td><input type="number" min="0" max="24" step="0.25" value="${entry.hours}" data-day="${entry.day}" class="hours" /></td>
            <td><textarea data-day="${entry.day}" class="desc">${entry.description || ''}</textarea></td>
          `;
          rowsEl.appendChild(tr);
        }
      } catch (err) {
        msgEl.textContent = err.message;
      }
    }

    function collectEntries() {
      const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      return days.map((day) => ({
        day,
        hours: Number(document.querySelector(`input.hours[data-day="${day}"]`).value || 0),
        description: document.querySelector(`textarea.desc[data-day="${day}"]`).value
      }));
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      msgEl.textContent = 'Saving...';
      const res = await fetch('/api/timesheet', {
        method: exists ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ year, weekNumber, entries: collectEntries() })
      });

      const data = await res.json();
      if (!res.ok) {
        msgEl.textContent = data.error || 'Save failed';
        return;
      }

      exists = true;
      msgEl.textContent = 'Timesheet saved successfully';
    });

    init();
  </script>
</body>
</html>
