<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 2rem auto; padding: 0 1rem; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    a.btn, button { padding: 8px 12px; border: 1px solid #aaa; background: #f5f5f5; text-decoration: none; color: #000; border-radius: 6px; display: inline-block; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e5e5e5; padding: 8px; text-align: left; }
    input, textarea, select { width: 100%; padding: 6px; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>
  <div class="row">
    <a class="btn" href="/timesheet.html">Open Timesheet</a>
  </div>

  <section class="card">
    <h2>User</h2>
    <div id="userInfo">Loading...</div>
  </section>

  <section class="card">
    <h2>Current Week</h2>
    <div id="currentWeekInfo">Loading...</div>
    <div id="currentWeekAction"></div>
  </section>

  <section class="card">
    <h2>Profile</h2>
    <form id="profileForm">
      <label>Full Name</label><input name="fullName" required />
      <label>Address</label><textarea name="address"></textarea>
      <label>Rate</label><input name="rate" type="number" step="0.01" min="0" required />
      <label>Rate Type</label>
      <select name="rateType">
        <option value="hourly">Hourly</option>
        <option value="daily">Daily</option>
      </select>
      <label>Company Name (subcontractor only)</label><input name="companyName" />
      <label>Payment Details</label><textarea name="paymentDetails"></textarea>
      <button type="submit">Update Profile</button>
    </form>
    <div id="profileMsg"></div>
  </section>

  <section class="card">
    <h2>Past Weeks</h2>
    <table>
      <thead><tr><th>Year</th><th>Week</th><th>Hours</th><th>Actions</th></tr></thead>
      <tbody id="timesheetRows"></tbody>
    </table>
  </section>

  <script>
    const userInfo = document.getElementById('userInfo');
    const currentWeekInfo = document.getElementById('currentWeekInfo');
    const currentWeekAction = document.getElementById('currentWeekAction');
    const timesheetRows = document.getElementById('timesheetRows');
    const profileForm = document.getElementById('profileForm');
    const profileMsg = document.getElementById('profileMsg');

    async function init() {
      const res = await fetch('/api/dashboard');
      const data = await res.json();
      if (!res.ok) {
        userInfo.textContent = data.error || 'Failed to load dashboard';
        return;
      }

      userInfo.textContent = `${data.user.fullName} (${data.user.employmentType})`;
      currentWeekInfo.textContent = `ISO Week ${data.currentWeek.weekNumber}, ${data.currentWeek.year} (starts ${data.currentWeek.weekStartDate})`;

      const y = data.currentWeek.year;
      const w = data.currentWeek.weekNumber;
      currentWeekAction.innerHTML = data.hasCurrentTimesheet
        ? `<a class="btn" href="/timesheet.html?year=${y}&weekNumber=${w}">Edit Timesheet</a>`
        : `<a class="btn" href="/timesheet.html?year=${y}&weekNumber=${w}">Create This Week's Timesheet</a>`;

      profileForm.fullName.value = data.user.fullName || '';
      profileForm.address.value = data.user.address || '';
      profileForm.rate.value = data.user.rate ?? 0;
      profileForm.rateType.value = data.user.rateType || 'hourly';
      profileForm.companyName.value = data.user.companyName || '';
      profileForm.paymentDetails.value = data.user.paymentDetails || '';

      timesheetRows.innerHTML = '';
      for (const ts of data.timesheets) {
        const invoiceAction = data.user.employmentType === 'subcontractor'
          ? `<a class="btn" href="/invoice.html?year=${ts.year}&weekNumber=${ts.weekNumber}">Generate Invoice</a>`
          : '';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${ts.year}</td>
          <td>${ts.weekNumber}</td>
          <td>${ts.totalHours ?? 0}</td>
          <td>
            <a class="btn" href="/timesheet.html?year=${ts.year}&weekNumber=${ts.weekNumber}">Edit</a>
            ${invoiceAction}
          </td>
        `;
        timesheetRows.appendChild(row);
      }
    }

    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      profileMsg.textContent = 'Updating profile...';

      const payload = {
        fullName: profileForm.fullName.value,
        address: profileForm.address.value,
        rate: Number(profileForm.rate.value),
        rateType: profileForm.rateType.value,
        companyName: profileForm.companyName.value,
        paymentDetails: profileForm.paymentDetails.value
      };

      const res = await fetch('/api/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      profileMsg.textContent = res.ok ? 'Profile updated' : (data.error || 'Update failed');
      if (res.ok) await init();
    });

    init();
  </script>
</body>
</html>
