<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Admin</title><link rel="stylesheet" href="../css/theme.css"/></head>
<body><main class="page"><header class="page-header"><div><div class="brand">Operations Admin</div><h1 style="margin:.2rem 0">Dashboard & Job Control</h1></div><div class="row"><span class="badge" data-session-status></span><button id="logout" class="btn btn-secondary">Logout</button></div></header>
<div id="admin-notice" class="notice hidden" style="margin-top:10px"></div>
<section class="grid cols-3" style="margin-top:12px" id="kpis"></section>
<section class="grid cols-2" style="margin-top:12px">
<article class="card"><h3>Create Job</h3><form id="create-job" class="grid"><input class="input" name="title" placeholder="Job title" required/><input class="input" name="helpdeskRef" placeholder="Helpdesk ref" required/><input class="input" name="siteCode" placeholder="Site code" required/><select class="select" name="priority"><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select><button class="btn btn-primary" type="submit">Create Job</button></form></article>
<article class="card"><h3>Filters</h3><form id="job-filter" class="grid"><input class="input" name="search" placeholder="Job/helpdesk/site"/><select class="select" name="status"><option value="">Any status</option><option>Pending</option><option>Scheduled</option><option>Travelling</option><option>On Site</option><option>In Progress</option><option>Awaiting Hold Approval</option><option>On Hold</option><option>Complete</option></select><button class="btn btn-secondary" type="submit">Load Jobs</button></form></article>
</section>
<section class="card" style="margin-top:12px"><div class="row spread"><h3>Jobs</h3><a class="btn btn-secondary" href="scheduler.html">Scheduler</a></div><div class="table-wrap"><table class="table"><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Priority</th><th>Site</th><th>Engineer(s)</th><th></th></tr></thead><tbody id="jobs-body"></tbody></table></div></section>
<section class="grid cols-2" style="margin-top:12px"><article class="card"><h3>Hold Approvals</h3><div id="hold-queue" class="grid"></div></article><article class="card"><h3>Office View As</h3><form id="view-as-form" class="row"><input class="input" name="targetUserId" placeholder="Engineer user ID"/><button class="btn btn-secondary" type="submit">View As</button><button class="btn btn-danger" id="clear-view-as" type="button">Clear</button></form></article></section>
</main><script type="module" src="../js/pages/admin.js"></script></body></html>
