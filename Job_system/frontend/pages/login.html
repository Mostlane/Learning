<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cloudflare Job Portal | Login</title><link rel="stylesheet" href="../css/theme.css"/>
</head><body><main class="page" style="max-width:680px">
<header class="page-header"><div><div class="brand">Mostlane / Cloudflare Portal</div><h1 style="margin:.4rem 0">Secure Login</h1><p class="text-muted" style="margin:0">Master, office, and engineer login flow.</p></div><span class="badge" data-session-status>Checking...</span></header>
<section class="card" style="margin-top:16px">
<form id="login-form" class="grid">
<div><label>Username</label><input class="input" id="username" required autocomplete="username"/></div>
<div><label>Password</label><input class="input" id="password" type="password" required autocomplete="current-password"/></div>
<div class="row"><button class="btn btn-primary" type="submit">Sign In</button></div>
<div id="login-notice" class="notice hidden"></div>
</form>
<p class="text-muted">Initial master login is configured in backend seed data and should be changed after first sign-in.</p>
</section>
</main><script type="module" src="../js/pages/login.js"></script></body></html>
