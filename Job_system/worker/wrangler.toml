name = "job-system"
main = "src/index.js"
compatibility_date = "2026-03-10"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "job-system"
database_id = "REPLACE_WITH_REAL_D1_DATABASE_ID"

[[r2_buckets]]
binding = "JOB_FILES"
bucket_name = "REPLACE_WITH_REAL_R2_BUCKET"
